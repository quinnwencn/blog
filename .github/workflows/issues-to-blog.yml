name: Issues to Blog

on:
  issues:
    types: [opened, edited, reopened]
  workflow_dispatch:

jobs:
  convert-issues-to-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Fetch open issues
        run: |
          # Fetch all open issues (public repo doesn't need auth)
          ISSUES=$(curl -s \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues?state=open&per_page=100")

          echo "$ISSUES" > issues.json
          echo "issues_count=$(echo "$ISSUES" | grep -o '"number"' | wc -l)" >> $GITHUB_OUTPUT

      - name: Convert issues to blog posts
        run: |
          mkdir -p _posts
          
          python3 << 'PYTHON_SCRIPT'
import json
import re

with open('issues.json', 'r') as f:
    issues = json.load(f)

for issue in issues:
    number = issue['number']
    title = issue['title']
    body = issue['body'] or ''
    created_at = issue['created_at']
    labels = [l['name'] for l in issue.get('labels', [])]
    
    date = created_at[:10]
    filename_title = re.sub(r'[^\w\s\u4e00-\u9fff-]', '', title)
    filename_title = re.sub(r'\s+', '-', filename_title).strip('-')
    filename = f"_posts/{date}-{filename_title}.html"
    
    html_body = body
    
    # Simple markdown to html conversion
    html_body = re.sub(r'^# (.+)$', r'<h1>\1</h1>', html_body, flags=re.MULTILINE)
    html_body = re.sub(r'^## (.+)$', r'<h2>\1</h2>', html_body, flags=re.MULTILINE)
    html_body = re.sub(r'^### (.+)$', r'<h3>\1</h3>', html_body, flags=re.MULTILINE)
    html_body = re.sub(r'\*\*(.+?)\*\*', r'<strong>\1</strong>', html_body)
    html_body = re.sub(r'\*(.+?)\*', r'<em>\1</em>', html_body)
    html_body = re.sub(r'`([^`]+)`', r'<code>\1</code>', html_body)
    html_body = re.sub(r'```(\w+)?\n([\s\S]*?)```', r'<pre><code>\2</code></pre>', html_body)
    html_body = re.sub(r'^- (.+)$', r'<li>\1</li>', html_body, flags=re.MULTILINE)
    html_body = re.sub(r'!\[([^\]]*)\]\(([^)]+)\)', r'<img src="\2" alt="\1" style="max-width:100%;">', html_body)
    html_body = re.sub(r'\[([^\]]+)\]\(([^)]+)\)', r'<a href="\2">\1</a>', html_body)
    
    # Wrap lines in paragraphs
    lines = html_body.split('\n')
    new_lines = []
    in_list = False
    
    for line in lines:
        stripped = line.strip()
        if stripped.startswith(('<h', '<pre', '<ul', '<li', '<img', '<a', '</', '<p')):
            if in_list:
                in_list = False
                new_lines.append('</ul>')
            new_lines.append(line)
        elif stripped == '':
            if in_list:
                in_list = False
                new_lines.append('</ul>')
            continue
        else:
            if in_list:
                continue
            new_lines.append(f'<p>{line}</p>')
    
    html_body = '\n'.join(new_lines)
    
    labels_html = ''
    for label in labels:
        labels_html += f'<span class="label">{label}</span> '
    
    html = f'''<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{title} - Quinn's Blog</title>
    <style>
        body {{ font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif; max-width:800px; margin:0 auto; padding:20px; line-height:1.6; color:#333; }}
        a {{ color:#0366d6; text-decoration:none; }}
        a:hover {{ text-decoration:underline; }}
        .date {{ color:#6a737d; font-size:0.9em; }}
        .label {{ display:inline-block; padding:2px 8px; border-radius:12px; font-size:0.8em; margin-right:5px; background:#e1e4e8; color:#333; }}
        code {{ background:#f6f8fa; padding:2px 6px; border-radius:3px; font-family:monospace; }}
        pre {{ background:#f6f8fa; padding:15px; border-radius:6px; overflow-x:auto; }}
        pre code {{ background:none; padding:0; }}
        img {{ max-width:100%; }}
        ul {{ padding-left:20px; }}
        footer {{ border-top:1px solid #eee; padding-top:20px; margin-top:40px; color:#6a737d; }}
    </style>
</head>
<body>
    <p><a href="index.html">← Back to Home</a></p>
    <h1>{title}</h1>
    <p class="date">{date}</p>
    <div class="labels">{labels_html}</div>
    <hr>
    <div class="content">
{html_body}
    </div>
    <footer>
        <p>© 2026 Quinn's Blog. Generated from GitHub Issue #{number}</p>
    </footer>
</body>
</html>'''

    with open(filename, 'w', encoding='utf-8') as f:
        f.write(html)
    print(f"Created: {filename}")

print("Done!")
          PYTHON_SCRIPT

      - name: Check changes
        id: check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changes == 'true'
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add .
          git commit -m "Update blog from issues"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main
